<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Quiz | Cardiac AI</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.1.0/css/all.css">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .quiz-card {
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-3 bg-light min-vh-100 p-3">

        <a href="{% url 'StudentDashboard' %}" style="text-decoration: none;">
            <h5 class="text-primary text-center mb-4">
                <i class="fas fa-heartbeat"></i> Arrhythmia AI-AR
            </h5>
        </a>

        <nav class="nav flex-column">
            <a href="/UserApp/StudentDashboard/" class="nav-link">
                <i class="fas fa-home mr-2"></i> Dashboard
            </a>

            <a href="/UserApp/ECGModule/" class="nav-link">
                <i class="fas fa-chart-line mr-2"></i> ECG Learning
            </a>

            <a href="/UserApp/HeartAnatomy/" class="nav-link">
                <i class="fas fa-heart mr-2"></i> Anatomy Viewer
            </a>

            <a href="/UserApp/QuizModule/" class="nav-link active">
                <i class="fas fa-question-circle mr-2"></i> Quiz
            </a>

            <a href="/UserApp/Certificate/" class="nav-link">
                <i class="fas fa-certificate mr-2"></i> Certificate
            </a>

            <a href="/UserApp/logout" class="nav-link text-danger mt-4">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="col-md-9 p-4">

        <h2 class="mb-4">📝 Medical Quiz</h2>

        <!-- ✅ FORM START -->
        <form method="POST" action="/UserApp/Certificate/">
            {% csrf_token %}

            <!-- ✅ NAME INPUT (FIXED) -->
            <div class="card quiz-card mb-4 p-3">
                <label><strong>Enter Your Name:</strong></label>
                <input type="text"
                       name="student_name"
                       class="form-control"
                       placeholder="Enter your full name"
                       required>
            </div>

            <!-- QUESTIONS -->
            {% for q in questions %}
            <div class="card quiz-card mb-4 p-3">

                <h5>
                    <strong>Q{{ forloop.counter }}. {{ q.question }}</strong>
                </h5>

                {% for option in q.options %}
                <div class="form-check mt-2">
                    <input class="form-check-input"
                           type="radio"
                           name="q{{ forloop.parentloop.counter }}"
                           value="{{ forloop.counter0 }}"
                           required>

                    <label class="form-check-label">
                        {{ option }}
                    </label>
                </div>
                {% endfor %}

            </div>
            {% endfor %}

            <!-- SUBMIT BUTTON -->
            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-lg px-5">
                    <i class="fas fa-check-circle"></i> Submit Quiz
                </button>
            </div>

        </form>
        <!-- ✅ FORM END -->

    </div>

</div>
</div>

</body>
</html>
