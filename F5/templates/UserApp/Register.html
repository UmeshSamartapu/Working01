<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Personnel Registration | Cardiac AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap only -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.1.0/css/all.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand text-primary" href="#">
            <i class="fas fa-heartbeat mr-2"></i>Arrhythmia AI-AR
        </a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="fas fa-bars"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/">About Project</a></li>
                <li class="nav-item"><a class="nav-link" href="/">Admin</a></li>
                <li class="nav-item"><a class="nav-link" href="/">User</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="col-md-9 p-4">

    <h2>📝 Medical Quiz</h2>

    <!-- ✅ FORM START -->
    <form method="POST" action="/UserApp/Certificate/">
        {% csrf_token %}

        <!-- ✅ MOVE NAME INPUT INSIDE FORM -->
        <div class="card mb-4 p-3">
            <label><strong>Enter Your Name:</strong></label>
            <input type="text"
                   name="student_name"
                   class="form-control"
                   placeholder="Enter your full name"
                   required>
        </div>

        {% for q in questions %}
        <div class="card mb-4 p-3">

            <p><strong>Q{{ forloop.counter }}. {{ q.question }}</strong></p>

            {% for option in q.options %}
            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       name="q{{ forloop.parentloop.counter }}"
                       value="{{ forloop.counter0 }}"
                       required>

                <label class="form-check-label">
                    {{ option }}
                </label>
            </div>
            {% endfor %}

        </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary btn-lg">
            Submit Quiz
        </button>

    </form>
    <!-- ✅ FORM END -->

</div>

<!-- Footer -->
<footer class="text-center text-muted mt-5 mb-3">
    <p>&copy; 2026 HeartSync AR</p>
</footer>

<!-- JS -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
